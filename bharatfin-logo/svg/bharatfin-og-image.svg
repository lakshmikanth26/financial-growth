<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0F172A"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#00C896" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>
  <!-- Large bars (right side, decorative) -->
  <g opacity="0.15">
    <rect x="820" y="330" width="60" height="240" rx="12" fill="#00C896"/>
    <rect x="910" y="240" width="60" height="330" rx="12" fill="#00C896"/>
    <rect x="1000" y="150" width="60" height="420" rx="12" fill="#00C896"/>
    <rect x="1090" y="80" width="60" height="490" rx="12" fill="#00C896"/>
  </g>
  <!-- Logo icon large -->
  <g transform="translate(80,180)">
    <rect x="0" y="130" width="56" height="70" rx="12" fill="#00C896"/>
    <rect x="80" y="84" width="56" height="116" rx="12" fill="#00A87C"/>
    <rect x="160" y="28" width="56" height="172" rx="12" fill="#007A5A"/>
    <line x1="28" y1="130" x2="188" y2="28" stroke="#00C896" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 12" opacity="0.5"/>
    <circle cx="188" cy="18" r="18" fill="#00C896"/>
    <circle cx="188" cy="18" r="8" fill="#0F172A"/>
  </g>
  <!-- Brand name -->
  <text x="80" y="460" font-family="'Sora', 'Segoe UI', Arial, sans-serif" font-size="96" font-weight="700" fill="#FFFFFF" letter-spacing="-4">BharatFin</text>
  <text x="84" y="520" font-family="'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif" font-size="28" font-weight="500" fill="#00C896" letter-spacing="10">SMART MONEY INDIA</text>
  <!-- Tagline -->
  <text x="84" y="580" font-family="'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif" font-size="22" font-weight="400" fill="#64748B" letter-spacing="1">Calculate. Plan. Grow.</text>
</svg>
